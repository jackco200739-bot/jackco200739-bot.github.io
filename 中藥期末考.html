            { q: "73. 既治寒闭证又治热闭证的药物是（）", o: { A:"苏合香", B:"牛黄", C:"细辛", D:"冰片", E:"麝香" }, ans: "E" },
            { q: "74. 善治石淋的要药是：", o: { A:"石韦", B:"滑石", C:"海金沙", D:"蝼蛄", E:"金钱草" }, ans: "E" },
            { q: "75. 既能温肺祛痰，又能利气散结、通络止痛的药物是（）", o: { A:"白芥子", B:"葶苈子", C:"紫苏子", D:"莱菔子", E:"白附子" }, ans: "A" },
            { q: "76. 开窍药的共同功效是（）", o: { A:"活血通经", B:"清热止痛", C:"化湿和胃", D:"催产下胎", E:"开窍醒神" }, ans: "E" },
            { q: "77. 既善利水渗湿，又能泄肾与膀胱之热的药物是（）", o: { A:"猪苓", B:"知母", C:"黄柏", D:"泽泻", E:"木通" }, ans: "D" },
            { q: "78. 功能燥湿化痰，祛风止痉，为治风痰的要药是（）", o: { A:"天南星", B:"半夏", C:"白前", D:"白芥子", E:"旋复花" }, ans: "A" },
            { q: "79. 石膏与知母的共同功效是（）", o: { A:"清肺胃热", B:"清心除烦", C:"清肺润燥", D:"清胃生津", E:"清肝明目" }, ans: "A" },
            { q: "80. 既能发汗解表，又能温中止呕，温肺止咳的药物是（）", o: { A:"麻黄", B:"荆芥", C:"桂枝", D:"羌活", E:"生姜" }, ans: "E" },
            { q: "81. 功能疏肝而破气的药是（）", o: { A:"吴茱萸", B:"青皮", C:"佛手", D:"香附", E:"柴胡" }, ans: "B" },
            { q: "82. 长于清肝胆湿热，泻肝胆实火的药物是：（ ）", o: { A:"夏枯草", B:"黄芩", C:"菊花", D:"龙胆", E:"苦参" }, ans: "D" },
            { q: "83. 治疗外感风寒表虚有汗者，常与白芍同用的药物是（）", o: { A:"麻黄", B:"桂枝", C:"白芷", D:"防风", E:"荆芥" }, ans: "B" },
            { q: "84. 陈皮的功效是( )", o: { A:"温肺化痰止咳", B:"润肺化痰止咳", C:"宣肺化痰止咳", D:"燥湿化痰止咳", E:"降逆化痰止咳" }, ans: "D" },
            { q: "85. 既能平肝潜阳，又降气逆的药物，首推（）", o: { A:"石决明", B:"磁石", C:"赭石", D:"牡蛎", E:"珍珠母" }, ans: "C" },
            { q: "86. 既能治风湿痹痛,又能治胎漏下血, 胎动不安的药物是（）", o: { A:"五加皮", B:"桑枝", C:"桑寄生", D:"狗脊", E:"千年健" }, ans: "C" },
            { q: "87. 红花的功效是：", o: { A:"行血补血，舒筋活络", B:"活血定痛，清热利湿", C:"活血通经，祛瘀止痛", D:"活血止痛，消肿散结", E:"活血祛瘀，润肠通便" }, ans: "C" },
            { q: "88. 治疗热病高热，热极动风，手足抽搐的首选药物是：", o: { A:"石膏", B:"黄连", C:"羚羊角", D:"大黄", E:"牡蛎" }, ans: "C" },
            { q: "89. 川芎的功效是（）", o: { A:"活血行气，祛风止痛", B:"活血调经，祛风通络", C:"活血行气，止血", D:"活血通经，祛瘀止痛", E:"活血行气，消积止痛" }, ans: "A" },
            { q: "90. 槟榔的功效是（）", o: { A:"驱虫消积，行气利水", B:"杀虫疗癣，行气利水", C:"驱虫消积，润肠通便", D:"杀虫疗癣，润肠通便", E:"驱虫消积，通便，润肺" }, ans: "A" }
        ];

        const container = document.getElementById('qa-content');

        // 自動渲染題目，完全不依賴正則表達式，保證能渲染出來
        quizData.forEach((item, index) => {
            const qNum = index + 1;
            
            // 題幹區塊
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'question';
            qTitle.innerText = item.q;
            qBlock.appendChild(qTitle);

            // 選項區塊
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';

            for (const [key, value] of Object.entries(item.o)) {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = 'label_q' + qNum + '_' + key;

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + qNum;
                radio.value = key;

                label.appendChild(radio);
                label.appendChild(document.createTextNode(' ' + key + '. ' + value));
                optsDiv.appendChild(label);
            }

            qBlock.appendChild(optsDiv);
            container.appendChild(qBlock);
        });

        // 批改功能
        function submitQuiz() {
            let form = document.getElementById('quiz-form');
            let score = 0;
            let answered = 0;
            const totalQuestions = quizData.length;

            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerText = "已批改完成";

            quizData.forEach((item, index) => {
                const qNum = index + 1;
                const options = document.getElementsByName('q' + qNum);
                let selectedValue = null;
                const correctValue = item.ans;

                options.forEach(opt => {
                    opt.disabled = true;
                    if(opt.checked) {
                        selectedValue = opt.value;
                        answered++;
                    }
                });

                if (correctValue) {
                    let correctLabel = document.getElementById('label_q' + qNum + '_' + correctValue);
                    if (correctLabel) correctLabel.classList.add('correct-answer');
                }

                if(selectedValue) {
                    if (selectedValue === correctValue) {
                        score++;
                    } else {
                        let wrongLabel = document.getElementById('label_q' + qNum + '_' + selectedValue);
                        if (wrongLabel) wrongLabel.classList.add('wrong-answer');
                    }
                }
            });

            let scoreBoard = document.getElementById('score-board');
            let percentage = Math.round((score / totalQuestions) * 100);
            scoreBoard.innerHTML = `
                测验结束！<br>
                作答题数：${answered} / ${totalQuestions}<br>
                得分：${score} / ${totalQuestions} <br>
                准确率：${percentage}%
            `;
            scoreBoard.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
